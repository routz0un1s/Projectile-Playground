<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Projectile Playground</title>
<style>
body { font-family: Arial; text-align:center; background:#eee; }
canvas { background:#111; margin-top:20px; }
</style>
</head>

<body>

<h1>Projectile Playground</h1>

<canvas id="canvas" width="800" height="400"></canvas><br><br>

Angle <input type="range" id="angle" min="0" max="90" value="45"><br>
Velocity <input type="range" id="velocity" min="10" max="100" value="50"><br>

<select id="gravity">
<option value="9.8">Earth</option>
<option value="1.6">Moon</option>
<option value="3.7">Mars</option>
</select><br><br>

<button id="launch">Launch</button>
<button id="reset">Reset</button>

<p>Distance: <span id="distance">0</span></p>
<p>Max Height: <span id="maxHeight">0</span></p>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const angleSlider = document.getElementById("angle");
const velocitySlider = document.getElementById("velocity");
const gravitySelect = document.getElementById("gravity");

const distanceEl = document.getElementById("distance");
const maxHeightEl = document.getElementById("maxHeight");

let x = 50;
let y = canvas.height - 20;

let vx = 0;
let vy = 0;

let gravity = 9.8;
let running = false;

let startX = 50;
let maxHeight = y;

function update() {
    if (!running) return;

    const dt = 0.016;

    vy += gravity * dt;
    x += vx * dt;
    y += vy * dt;

    if (y < maxHeight) {
        maxHeight = y;
    }

    if (y > canvas.height - 10) {
        running = false;
        distanceEl.textContent = (x - startX).toFixed(1);
        maxHeightEl.textContent = (canvas.height - maxHeight).toFixed(1);
    }
}

function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // ground
    ctx.beginPath();
    ctx.moveTo(0, canvas.height - 10);
    ctx.lineTo(canvas.width, canvas.height - 10);
    ctx.stroke();

    // ball
    ctx.beginPath();
    ctx.arc(x,y,8,0,Math.PI*2);
    ctx.fillStyle="red";
    ctx.fill();
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

document.getElementById("launch").onclick = () => {
    const angle = Number(angleSlider.value);
    const velocity = Number(velocitySlider.value);
    gravity = Number(gravitySelect.value);

    const rad = angle * Math.PI / 180;

    vx = velocity * 3.5 * Math.cos(rad);
    vy = -velocity * 3.5 * Math.sin(rad);

    x = 50;
    y = canvas.height - 20;

    startX = x;
    maxHeight = y;

    distanceEl.textContent = "0";
    maxHeightEl.textContent = "0";

    running = true;
};

document.getElementById("reset").onclick = () => {
    running = false;
    x = 50;
    y = canvas.height - 20;
};

loop();
</script>

</body>
</html>
