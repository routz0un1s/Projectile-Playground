<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Projectile Playground</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f4f4f4;
    text-align: center;
}

.container {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 20px;
}

canvas {
    background: #111;
    border-radius: 10px;
}

.controls {
    display: flex;
    flex-direction: column;
    width: 200px;
    gap: 10px;
}

button {
    padding: 10px;
    background: #333;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}
button:hover { background:#555; }

input, select { width: 100%; }
</style>
</head>

<body>

<h1>Projectile Playground</h1>

<div class="container">

<canvas id="canvas" width="800" height="450"></canvas>

<div class="controls">
<label>Angle <span id="aVal">45</span></label>
<input id="angle" type="range" min="0" max="90" value="45">

<label>Velocity <span id="vVal">50</span></label>
<input id="velocity" type="range" min="10" max="100" value="50">

<label>Gravity</label>
<select id="gravity">
<option value="9.8">Earth</option>
<option value="1.6">Moon</option>
<option value="3.7">Mars</option>
</select>

<button id="launch">Launch</button>
<button id="reset">Reset</button>

<p>Distance: <span id="dist">0</span></p>
<p>Height: <span id="height">0</span></p>
</div>

</div>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const groundY = canvas.height - 40;

const scale = 4;
const dt = 0.016;

let x, y, vx, vy;
let gravity;
let running = false;
let path = [];

const startX = 50;

let maxHeight = 0;

const angleS = document.getElementById("angle");
const velS = document.getElementById("velocity");
const gravS = document.getElementById("gravity");

const distEl = document.getElementById("dist");
const heightEl = document.getElementById("height");

function reset() {
    x = startX;
    y = groundY;

    vx = 0;
    vy = 0;

    path = [];
    running = false;
    maxHeight = 0;

    distEl.textContent = 0;
    heightEl.textContent = 0;
}

function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // ground
    ctx.strokeStyle = "#555";
    ctx.beginPath();
    ctx.moveTo(0, groundY);
    ctx.lineTo(canvas.width, groundY);
    ctx.stroke();

    // path
    ctx.strokeStyle = "cyan";
    ctx.beginPath();
    path.forEach((p,i)=>{
        if(i===0) ctx.moveTo(p.x,p.y);
        else ctx.lineTo(p.x,p.y);
    });
    ctx.stroke();

    // ball
    ctx.fillStyle = "red";
    ctx.beginPath();
    ctx.arc(x,y,8,0,Math.PI*2);
    ctx.fill();
}

function update() {
    if(!running) return;

    vy += gravity * scale * dt;

    x += vx * dt;
    y += vy * dt;

    path.push({x,y});

    let h = (groundY - y)/scale;
    if(h > maxHeight) maxHeight = h;

    if(y >= groundY) {
        running = false;

        distEl.textContent = ((x - startX)/scale).toFixed(2);
        heightEl.textContent = maxHeight.toFixed(2);
    }
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

document.getElementById("launch").onclick = () => {

    const angle = angleS.value * Math.PI/180;
    const v = Number(velS.value);

    gravity = Number(gravS.value);

    vx = v * Math.cos(angle) * scale;
    vy = -v * Math.sin(angle) * scale;

    reset();
    running = true;
};

document.getElementById("reset").onclick = reset;

angleS.oninput = () => document.getElementById("aVal").textContent = angleS.value;
velS.oninput = () => document.getElementById("vVal").textContent = velS.value;

reset();
loop();

</script>

</body>
</html>
